name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install

    - name: Start Juice Shop Docker
      run: |
        docker run -d -p 3000:3000 bkimminich/juice-shop
        sleep 60

    - name: Wait for Juice Shop to be ready
      run: |
        echo "Waiting for Juice Shop..."
        timeout 120 bash -c 'until curl -f http://localhost:3000 > /dev/null 2>&1; do sleep 2; done' || true
        echo "Juice Shop is up!"

    - name: Install Newman
      run: npm install -g newman newman-reporter-htmlextra

    - name: Run Newman API tests
      run: |
        newman run postman/JuiceShop.postman_collection.json \
          -e postman/envV.json \
          -r cli,htmlextra \
          --reporter-htmlextra-export newman-report.html

    - uses: actions/upload-artifact@v4
      if: always()
      with: 
        name: newman-report
        path: newman-report.html

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright Register Test First
      run: npx playwright test --grep @register

    - name: Run Playwright tests
      run: npx playwright test

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30